name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist

          # Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/vcfilt-linux-amd64 ./cmd/vcfilt/

          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/vcfilt-linux-arm64 ./cmd/vcfilt/

          # macOS amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/vcfilt-darwin-amd64 ./cmd/vcfilt/

          # macOS arm64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/vcfilt-darwin-arm64 ./cmd/vcfilt/

          # Windows amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/vcfilt-windows-amd64.exe ./cmd/vcfilt/

          # Create tarballs
          cd dist
          for f in vcfilt-linux-* vcfilt-darwin-*; do
            tar czf ${f}.tar.gz ${f}
          done
          zip vcfilt-windows-amd64.zip vcfilt-windows-amd64.exe
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vcfilt-linux-amd64.tar.gz
            dist/vcfilt-linux-arm64.tar.gz
            dist/vcfilt-darwin-amd64.tar.gz
            dist/vcfilt-darwin-arm64.tar.gz
            dist/vcfilt-windows-amd64.zip
          generate_release_notes: true

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write   # required for ghcr.io push
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vcfilt
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
